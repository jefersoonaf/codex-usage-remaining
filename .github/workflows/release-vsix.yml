name: Build and Release VSIX

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create or update a GitHub Release with the generated VSIX"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Optional release tag. If empty, uses v<package.json version>. The VSIX version is derived from this tag."
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  build-vsix:
    name: Build VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve release version
        id: version
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME="$GITHUB_REF_NAME"
            VERSION="${TAG_NAME#v}"
          elif [[ -n "${INPUT_RELEASE_TAG:-}" ]]; then
            TAG_NAME="$INPUT_RELEASE_TAG"
            VERSION="${TAG_NAME#v}"
          else
            VERSION="$PACKAGE_VERSION"
            TAG_NAME="v${PACKAGE_VERSION}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release version '$VERSION'. Use a semantic version like 0.0.2 or v0.0.2."
            exit 1
          fi

          npm version "$VERSION" --no-git-tag-version --allow-same-version

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VSIX_NAME="codex-usage-remaining-${VERSION}.vsix"

          npx --yes @vscode/vsce package --no-dependencies -o "$VSIX_NAME"

          echo "vsix=$VSIX_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-usage-remaining-vsix
          path: ${{ steps.package.outputs.vsix }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VSIX_FILE: ${{ steps.package.outputs.vsix }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$VSIX_FILE" --clobber
          else
            gh release create "$TAG_NAME" "$VSIX_FILE" \
              --target "$GITHUB_SHA" \
              --title "Codex Usage Remaining ${TAG_NAME}" \
              --notes "VSIX generated automatically by GitHub Actions."
          fi
